# Luna v5.1 Configuration — Convergence
# All Phi-derived parameters are computed from PHI in luna_common.constants
# This file is for runtime configuration only.

[luna]
version = "5.1.0"
agent_name = "LUNA"
data_dir = "memory_fractal"

[consciousness]
# Loaded from luna_common.constants — do NOT override unless testing
# tau = 1.618
# kappa = 2.618
# dt = 0.618
checkpoint_file = "memory_fractal/consciousness_state_v2.json"
backup_on_save = true

[memory]
fractal_root = "memory_fractal"
levels = ["seeds", "roots", "branches", "leaves"]
max_memories_per_level = 500

[observability]
log_level = "INFO"
log_file = "logs/luna.log"
metrics_enabled = true

[heartbeat]
interval_seconds = 30             # Orchestrator-only: async loop interval
fingerprint_enabled = true        # Orchestrator-only: identity check per beat
checkpoint_interval = 100         # Shared: save checkpoint every N idle steps

[llm]
provider = "deepseek"
model = "deepseek-reasoner"
base_url = "https://api.deepseek.com/v1"
# api_key = ""  # Prefer DEEPSEEK_API_KEY env var
max_tokens = 8192
temperature = 0.7

[dream]
inactivity_threshold = 7200    # 2h
consolidation_window = 100
max_dream_duration = 300       # 5min cap
report_dir = "memory_fractal/dreams"
enabled = true

[orchestrator]
autonomy = "supervised"        # supervised | semi_autonomous | autonomous
llm_augment = true
max_cycles = 0            # 0 = infinite loop
checkpoint_interval = 1
cycle_timeout = 600
retry_max = 3
retry_base_delay = 1.0

[chat]
max_history = 60
memory_search_limit = 5
idle_heartbeat = true
save_conversations = true
prompt_prefix = "luna> "

[metrics]
enabled = true
cache_enabled = true
cache_dir = "data/metrics_cache"
timeout_seconds = 60
python_enabled = true
rust_enabled = false
java_enabled = false
typescript_enabled = false
c_enabled = false

[fingerprint]
enabled = true
secret_file = "config/fingerprint.key"
ledger_file = "data/fingerprints.jsonl"
watermark_enabled = false

[safety]
enabled = true
snapshot_dir = "data/snapshots"
max_snapshots = 10
retention_days = 7
max_generations_per_hour = 100
max_commits_per_hour = 20
watchdog_threshold = 3

[identity]
ledger_file = "luna/data/identity_ledger.jsonl"
founding_docs = ["docs/FOUNDERS_MEMO.md", "docs/LUNA_CONSTITUTION.md", "docs/FOUNDING_EPISODES.md"]
recovery_enabled = true

[api]
host = "127.0.0.1"
port = 8618                    # floor(PHI * 5326) = 8618
auth_enabled = false              # API sur 127.0.0.1 uniquement, pas besoin de token
auth_token_file = "config/api_token"
rate_limit_rpm = 60
